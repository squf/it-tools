<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batch Builder — UPN Control Center</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    
    <h1 class="page-title">🔧 Batch Builder</h1>
    <div class="dryrun-panel">
      <label class="toggle">
        <input type="checkbox" id="dryrun-toggle" checked>
        <span class="slider"></span>
      </label>
      <div>
        <strong>Dry Run Mode</strong>
        <div class="hint">When <strong>ON</strong>, the runbook validates and reports what <em>would</em> change without writing to AD.</div>
      </div>
    </div>
    <div class="controls">
      <input type="search" id="batch-search" placeholder="Search users…" style="flex:1;min-width:200px">
      <select id="batch-filter">
        <option value="">All statuses</option>
        <option value="dryrun">Dry Run</option>
        <option value="success">Success</option>
        <option value="pending">Pending</option>
        <option value="failed">Failed</option>
        <option value="skipped">Skipped</option>
      </select>
      <span id="selected-count" class="text-sm text-muted">0 selected</span>
      <button id="submit-batch" disabled>🚀 Submit Batch</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th><input type="checkbox" id="select-all"></th>
          <th>Name</th><th>SAM</th><th>Current UPN</th><th>Target UPN</th><th>Status</th>
        </tr></thead>
        <tbody id="batch-tbody"><tr><td colspan="6" class="empty"><span class="spinner"></span> Loading…</td></tr></tbody>
      </table>
    </div>
    <div class="results-panel" id="results-panel">
      <h3>📋 Batch Results</h3>
      <div id="results-summary"></div>
      <div class="table-wrap mt">
        <table>
          <thead><tr><th>Name</th><th>SAM</th><th>Old UPN</th><th>New UPN</th><th>Status</th><th>Details</th></tr></thead>
          <tbody id="results-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
    <script src="/js/batch.js"></script>
</body>
</html>
