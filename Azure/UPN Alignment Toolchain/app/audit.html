<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Log — UPN Control Center</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    
    <h1 class="page-title">📜 Audit Log</h1>
    <div class="controls">
      <input type="date" id="audit-date">
      <input type="search" id="audit-search" placeholder="Search target, actor, batch ID…" style="flex:1;min-width:200px">
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Time</th><th>Actor</th><th>Action</th><th>Target</th><th>Old Value</th><th>New Value</th><th>Status</th><th>Batch ID</th></tr></thead>
        <tbody id="audit-tbody"><tr><td colspan="8" class="empty"><span class="spinner"></span> Loading…</td></tr></tbody>
      </table>
    </div>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
    <script src="/js/audit.js"></script>
</body>
</html>
